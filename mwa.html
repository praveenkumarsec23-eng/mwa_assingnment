<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #4a4a4a;
        }

        .question {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f7f9fc;
            transition: transform 0.2s;
        }

        .question:hover {
            transform: scale(1.02);
        }

        .question h3 {
            margin-bottom: 10px;
            color: #333;
        }

        label {
            display: block;
            margin: 6px 0;
            padding: 6px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        label:hover {
            background-color: #e3e8ff;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(to right, #ff6a4a, #fda763);
        }

        .result {
            text-align: center;
            font-size: 22px;
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌟 Online Quiz 🌟</h1>

    <form id="quizForm">

        <div class="question">
            <h3>1. What does HTML stand for?</h3>
            <label><input type="radio" name="q1" value="0"> Hyper Trainer Marking Language</label>
            <label><input type="radio" name="q1" value="1"> Hyper Text Markup Language</label>
            <label><input type="radio" name="q1" value="0"> Hyper Text Marketing Language</label>
        </div>

        <div class="question">
            <h3>2. Which language is used for styling web pages?</h3>
            <label><input type="radio" name="q2" value="0"> HTML</label>
            <label><input type="radio" name="q2" value="1"> CSS</label>
            <label><input type="radio" name="q2" value="0"> Python</label>
        </div>

        <div class="question">
            <h3>3. Which is a JavaScript framework?</h3>
            <label><input type="radio" name="q3" value="1"> React</label>
            <label><input type="radio" name="q3" value="0"> Django</label>
            <label><input type="radio" name="q3" value="0"> Flask</label>
        </div>

        <div class="question">
            <h3>4. What does JS stand for?</h3>
            <label><input type="radio" name="q4" value="1"> JavaScript</label>
            <label><input type="radio" name="q4" value="0"> Java System</label>
            <label><input type="radio" name="q4" value="0"> Just Script</label>
        </div>

        <div class="question">
            <h3>5. Which tag is used for a hyperlink?</h3>
            <label><input type="radio" name="q5" value="1"> &lt;a&gt;</label>
            <label><input type="radio" name="q5" value="0"> &lt;link&gt;</label>
            <label><input type="radio" name="q5" value="0"> &lt;href&gt;</label>
        </div>

        <button type="button" onclick="calculateScore()">Submit Quiz 🚀</button>

    </form>

    <div id="result" class="result"></div>

    <div class="footer">
        Assignment submitted by:<br>
        <strong>Praveen Kumar, Gautham, Sanjay, Shabareesh Kumar</strong>
    </div>

</div>

<script>
    function calculateScore() {
        let score = 0;
        const form = document.getElementById("quizForm");
        const answers = new FormData(form);

        for (let value of answers.values()) {
            score += parseInt(value);
        }

        document.getElementById("result").innerHTML = 
            "🎉 Your Score: " + score + " / 5";
    }
</script>

</body>
</html>
